{{template "base" .}}

{{define "title"}}QuickShare - Modern, Private Text and Code Sharing{{end}}

{{define "content"}}
<div class="editor-container fade-in">
    <!-- Editor Header Controls -->
    <form id="snippet-form" hx-post="/snippet" hx-target="body" hx-push-url="true" class="snippet-form">
        <div class="editor-controls">
            <!-- Language Dropdown -->
            <div class="control-group">
                <label for="language" class="control-label">Language</label>
                <select id="language" name="language" class="control-select">
                    <option value="plaintext">Plain Text</option>
                    <option value="javascript">JavaScript</option>
                    <option value="go">Go</option>
                    <option value="python">Python</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="json">JSON</option>
                    <option value="rust">Rust</option>
                    <option value="cpp">C++</option>
                    <option value="java">Java</option>
                    <option value="sql">SQL</option>
                    <option value="markdown">Markdown</option>
                </select>
            </div>

            <!-- Expiration Dropdown -->
            <div class="control-group">
                <label for="expiry" class="control-label">Expiration</label>
                <select id="expiry" name="expiry" class="control-select">
                    <option value="never">Never</option>
                    <option value="10m">10 Minutes</option>
                    <option value="1h">1 Hour</option>
                    <option value="1d">1 Day</option>
                    <option value="1w">1 Week</option>
                </select>
            </div>

            <!-- Save Action -->
            <div class="control-group action-group">
                <button type="submit" class="btn btn-primary" id="save-btn">
                    <span class="btn-text">Share Snippet</span>
                    <!-- Spinner for HTMX indicator -->
                    <span class="spinner htmx-indicator" id="save-spinner"></span>
                </button>
            </div>
        </div>

        <!-- Main Code Editor area -->
        <div class="editor-textarea-wrapper">
            <textarea 
                id="snippet-textarea" 
                name="text" 
                placeholder="Paste your text or code here..." 
                required 
                autofocus 
                class="editor-textarea"
                maxlength="500000"
            ></textarea>
        </div>

        <!-- Editor Footer Metadata -->
        <div class="editor-footer">
            <div class="keyboard-helper">
                <span class="shortcut-badge">Ctrl</span> + <span class="shortcut-badge">S</span> to Share
            </div>
            <div class="character-counter">
                <span id="char-count">0</span> / 500,000 characters
            </div>
        </div>
    </form>
</div>
{{end}}
